name: Modal 部署 (Komari 监控)

on:
  workflow_dispatch:
    inputs:
      deploy_region:
        description: '选择部署区域'
        required: false
        default: 'us-east | 美国东部（自动分配）'
        type: choice
        options:
          - 'us-east | 美国东部（自动分配）'
          - 'ap-northeast-1 | AWS 东京'
          - 'asia-southeast1 | GCP 新加坡'
          - 'us-west-2 | AWS 俄勒冈州'
          - 'us-east-1 | AWS 弗吉尼亚州'
          - 'eu-central-1 | AWS 法兰克福'
      modal_token_id:
        description: 'Modal ID (ak-xxxxx)'
        required: false
      modal_token_secret:
        description: 'Modal Secret (as-xxxxx)'
        required: false
      komari_server:
        description: 'Komari 地址 (例如 s1.abc.com:5000)'
        required: true
      komari_key:
        description: 'Komari 密钥'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 解析变量
        run: |
          REGION=$(echo "${{ github.event.inputs.deploy_region }}" | cut -d'|' -f1 | xargs)
          echo "DEPLOY_REGION=$REGION" >> $GITHUB_ENV
          echo "MID=${{ github.event.inputs.modal_token_id || secrets.MODAL_TOKEN_ID }}" >> $GITHUB_ENV
          echo "MSEC=${{ github.event.inputs.modal_token_secret || secrets.MODAL_TOKEN_SECRET }}" >> $GITHUB_ENV
          echo "K_SRV=${{ github.event.inputs.komari_server || secrets.KOMARI_SERVER }}" >> $GITHUB_ENV
          echo "K_KEY=${{ github.event.inputs.komari_key || secrets.KOMARI_KEY }}" >> $GITHUB_ENV

      - name: 设置环境并部署
        run: |
          pip install modal
          modal token set --token-id "$MID" --token-secret "$MSEC"
          # 这一步创建名为 komari-secrets 的密钥
          modal secret delete komari-secrets 2>/dev/null || true
          modal secret create komari-secrets \
            KOMARI_SERVER="$K_SRV" \
            KOMARI_KEY="$K_KEY" \
            DEPLOY_REGION="$DEPLOY_REGION"
          modal deploy app.py
