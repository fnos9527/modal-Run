name: Modal 部署 (Komari 监控)

on:
  workflow_dispatch:
    inputs:
      deploy_region:
        description: '选择部署区域'
        required: false
        default: 'us-east | 美国东部（自动分配）'
        type: choice
        options:
          - 'us-east | 美国东部（自动分配）'
          - 'ap-northeast-1 | AWS 东京'
          - 'asia-southeast1 | GCP 新加坡'
          - 'us-west-2 | AWS 俄勒冈州'
          - 'us-east-1 | AWS 弗吉尼亚州'
          - 'eu-central-1 | AWS 法兰克福'
      modal_token_id:
        description: 'Modal ID (若不填则使用仓库 Secrets)'
        required: false
      modal_token_secret:
        description: 'Modal Secret (若不填则使用仓库 Secrets)'
        required: false
      komari_server:
        description: 'Komari 地址 (若不填则使用仓库 Secrets)'
        required: false
      komari_key:
        description: 'Komari 密钥 (若不填则使用仓库 Secrets)'
        required: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 变量逻辑解析
        run: |
          # 核心逻辑：如果手动输入框为空，则从仓库 Secrets 中读取值
          
          # 处理 Token ID
          if [ -n "${{ github.event.inputs.modal_token_id }}" ]; then
            echo "MID=${{ github.event.inputs.modal_token_id }}" >> $GITHUB_ENV
          else
            echo "MID=${{ secrets.MODAL_TOKEN_ID }}" >> $GITHUB_ENV
          fi

          # 处理 Token Secret
          if [ -n "${{ github.event.inputs.modal_token_secret }}" ]; then
            echo "MSEC=${{ github.event.inputs.modal_token_secret }}" >> $GITHUB_ENV
          else
            echo "MSEC=${{ secrets.MODAL_TOKEN_SECRET }}" >> $GITHUB_ENV
          fi

          # 处理 Komari Server
          if [ -n "${{ github.event.inputs.komari_server }}" ]; then
            echo "K_SRV=${{ github.event.inputs.komari_server }}" >> $GITHUB_ENV
          else
            echo "K_SRV=${{ secrets.KOMARI_SERVER }}" >> $GITHUB_ENV
          fi

          # 处理 Komari Key
          if [ -n "${{ github.event.inputs.komari_key }}" ]; then
            echo "K_KEY=${{ github.event.inputs.komari_key }}" >> $GITHUB_ENV
          else
            echo "K_KEY=${{ secrets.KOMARI_KEY }}" >> $GITHUB_ENV
          fi

          # 解析部署区域
          REGION=$(echo "${{ github.event.inputs.deploy_region }}" | cut -d'|' -f1 | xargs)
          echo "DEPLOY_REGION=$REGION" >> $GITHUB_ENV

      - name: 设置环境并部署
        run: |
          # 检查必要的 Token 是否存在
          if [ -z "$MID" ] || [ -z "$MSEC" ]; then
            echo "❌ 错误：未检测到 Modal Token，请检查输入或 Secrets 设置！"
            exit 1
          fi
          
          # 安装 Modal 客户端
          pip install modal fastapi==0.115.12
          
          # 配置登录令牌
          modal token set --token-id "$MID" --token-secret "$MSEC"
          
          # --- 自动处理 Secret 冲突 ---
          echo "正在处理 Modal Secret..."
          # 使用 yes y 自动回答删除确认，防止脚本卡死
          yes y | modal secret delete komari-secrets 2>/dev/null || true
          
          # 创建新的 Secret 保险箱
          modal secret create komari-secrets \
            KOMARI_SERVER="$K_SRV" \
            KOMARI_KEY="$K_KEY" \
            DEPLOY_REGION="$DEPLOY_REGION"
          
          echo "✅ Secret 配置完成，开始部署 app.py..."
          
          # 执行部署
          modal deploy app.py

      - name: 清理运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1
